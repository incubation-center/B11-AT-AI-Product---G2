version: "3.8"

services:
  # ─── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qa-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # Supabase Storage
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ACCESS_KEY=${SUPABASE_ACCESS_KEY}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      # AI Services
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-qa-ai-documents}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # CORS — your frontend URL (set in Coolify env vars)
      - EXTRA_CORS_ORIGINS=${EXTRA_CORS_ORIGINS:-}
      # JWT
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      # Email / SMTP
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-QA Analytics}
      # OTP
      - OTP_EXPIRE_MINUTES=${OTP_EXPIRE_MINUTES:-3}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ─── Frontend (Next.js) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000/api}
    container_name: qa-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
